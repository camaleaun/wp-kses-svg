name: PR Preview - Build
on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
jobs:
  build:
    uses: WordPress/action-wp-playground-pr-preview/.github/workflows/preview-build.yml@v3
    with:
      artifacts: plugin-zip=build/wp-kses-svg.zip
      build-command: |
        git submodule update --init --recursive
        mkdir -p build
        git archive HEAD --prefix=wp-kses-svg/ | tar xf - -C build/
        git -C lib/selfdirectory archive HEAD \
          --prefix=wp-kses-svg/lib/selfdirectory/ \
          -- class-selfdirectory.php \
          | tar xf - -C build/
        (cd build && zip -r wp-kses-svg.zip wp-kses-svg)
