<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <title>XSS via CSS expression in style attribute</title>
  <rect x="0" y="0" width="100" height="100"
        style="fill:expression(alert('xss-expression'));color:red"/>
  <circle cx="50" cy="50" r="40"
          style="fill:url(javascript:alert('xss-url'))"/>
</svg>
